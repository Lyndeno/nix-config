pull_request_rules:
  - name: Automatically merge successful flake updates
    conditions:
      - author=Lyndeno
      - title=Update flake.lock
      - "check-success*=ci/hydra:nix-config:*:aarch64-linux.nixos-trinity"
      - "check-success*=ci/hydra:nix-config:*:x86_64-linux.nixos-morpheus"
      - "check-success*=ci/hydra:nix-config:*:x86_64-linux.nixos-neo"
      - "check-success*=ci/hydra:nix-config:*:x86_64-linux.nixos-oracle"
      - "check-success*=ci/hydra:nix-config:*:x86_64-linux.git-hooks"
    actions:
      merge:
        method: merge
  - name: Automatically merge dependabot updates
    conditions:
      - author=dependabot
      - "check-success~=nix-build"
    actions:
      merge:
        method: merge
